<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .fav-dark { display: none; }
    @media (prefers-color-scheme: dark) {
      .fav-light { display: none; }
      .fav-dark { display: inline; }
    }
  </style>
  <g class="fav-light">
    <rect x="2" y="2" width="28" height="28" rx="6" fill="#faf9f5" stroke="rgba(31,30,29,0.4)" stroke-width="1"/>
    <path d="M 15 9 L 15 19 C 15 22 13 23 11 23" fill="none" stroke="#4a3418" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g class="fav-dark">
    <rect x="2" y="2" width="28" height="28" rx="6" fill="#181614" stroke="rgba(255,255,255,0.28)" stroke-width="1"/>
    <path d="M 15 9 L 15 19 C 15 22 13 23 11 23" fill="none" stroke="#c7b79e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
